name: Quality Gate

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Protocol, API, UI, and PostgreSQL
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CI: "true"
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/ipo_one_test
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: ipo_one_test
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ipo_one_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.1.3
          run_install: false

      - name: Set up Node.js LTS
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile

      - name: Run repository quality gate
        run: pnpm run check

      - name: Run adversarial HTTP security suite
        run: pnpm run test:security

      - name: Run PostgreSQL recovery suite
        run: pnpm run test:postgres

      - name: Run isolated vertical slice
        run: pnpm run demo

      - name: Audit production dependencies
        run: pnpm audit --prod

      - name: Run live API and UI smoke
        shell: bash
        run: |
          pnpm run dev > "$RUNNER_TEMP/ipo-one-server.log" 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid"' EXIT
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:3000/healthz > /dev/null; then
              break
            fi
            sleep 1
          done
          curl --fail --silent http://127.0.0.1:3000/healthz > /dev/null
          pnpm run smoke:api
