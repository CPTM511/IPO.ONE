name: Quality Gate

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Protocol, API, UI, PostgreSQL, and container
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CI: "true"
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/ipo_one_test
    services:
      postgres:
        # Official image index digest resolved 2026-07-12.
        image: postgres:17.10-alpine3.23@sha256:742f40ea20b9ff2ff31db5458d127452988a2164df9e17441e191f3b72252193
        env:
          POSTGRES_DB: ipo_one_test
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ipo_one_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.1.3
          run_install: false

      - name: Set up Node.js LTS
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile

      - name: Run repository quality gate
        run: pnpm run check

      - name: Run adversarial HTTP security suite
        run: pnpm run test:security

      - name: Run PostgreSQL recovery suite
        run: pnpm run test:postgres

      - name: Run isolated vertical slice
        run: pnpm run demo

      - name: Audit production dependencies
        run: pnpm audit --prod

      - name: Build and harden-smoke production container
        shell: bash
        run: |
          docker build --build-arg BUILD_REVISION="${GITHUB_SHA}" --tag ipo-one:ci .
          runtime_user="$(docker inspect --format='{{.Config.User}}' ipo-one:ci)"
          echo "Runtime user: $runtime_user"
          test "$runtime_user" = "65532:65532"
          runtime_version="$(docker run --rm --entrypoint=/nodejs/bin/node ipo-one:ci --version)"
          echo "Runtime Node: $runtime_version"
          test "$runtime_version" = "v24.17.0"
          if docker run --rm --entrypoint=/bin/sh ipo-one:ci -c true; then
            echo "Production image unexpectedly contains a shell" >&2
            exit 1
          fi
          docker run --detach --rm --name ipo-one-ci \
            --read-only \
            --tmpfs /tmp:rw,noexec,nosuid,nodev,size=16m \
            --cap-drop ALL \
            --security-opt no-new-privileges:true \
            --pids-limit 128 \
            --memory 768m \
            --cpus 1 \
            --publish 127.0.0.1:3001:8080 \
            --env IPO_ONE_ALLOWED_HOSTS=ipo.one,www.ipo.one \
            --env IPO_ONE_DEPLOYMENT_MODE=public_sandbox \
            --env IPO_ONE_HSTS_MAX_AGE=86400 \
            --env IPO_ONE_PUBLIC_ORIGIN=https://ipo.one \
            --env IPO_ONE_PUBLIC_SANDBOX_ACK=I_UNDERSTAND_NO_REAL_FUNDS \
            --env IPO_ONE_RELEASE_SHA="${GITHUB_SHA}" \
            --env IPO_ONE_SECURITY_CONTACT=https://github.com/CPTM511/IPO.ONE/security \
            --env IPO_ONE_TRUST_PROXY=true \
            ipo-one:ci
          trap 'docker rm --force ipo-one-ci >/dev/null 2>&1 || true' EXIT
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:3001/livez > /dev/null; then
              break
            fi
            sleep 1
          done
          curl --fail --silent http://127.0.0.1:3001/readyz > /dev/null
          curl --fail --silent \
            --header 'Host: ipo.one' \
            --header 'X-Forwarded-Proto: https' \
            http://127.0.0.1:3001/ > /dev/null
          discovery="$(curl --fail --silent \
            --header 'Host: ipo.one' \
            --header 'X-Forwarded-Proto: https' \
            http://127.0.0.1:3001/.well-known/ipo-one.json)"
          node -e "const value = JSON.parse(process.argv[1]); if (value.safety.realFundsEnabled !== false || value.interfaces.agentApi !== 'https://ipo.one/v1') process.exit(1)" "$discovery"

      - name: Run live API and UI smoke
        shell: bash
        run: |
          pnpm run dev > "$RUNNER_TEMP/ipo-one-server.log" 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid"' EXIT
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:3000/healthz > /dev/null; then
              break
            fi
            sleep 1
          done
          curl --fail --silent http://127.0.0.1:3000/healthz > /dev/null
          pnpm run smoke:api
